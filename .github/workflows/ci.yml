name: CI

# Build, typecheck and unit-test every push and pull request.
#
# Needs no server, no Docker and no secrets: the unit suite is hermetic and the
# integration suite (which does need a running server) is deliberately excluded.
#
# `bun run lint` is not wired in here on purpose — see the note at the bottom.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, typecheck, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Compiles the server and both workspace packages, and emits the .d.ts
      # files that the CLI typecheck below resolves @mxf-dev/* against.
      - name: Build (tsc -b)
        run: bunx tsc -b

      # The Ink TUI is excluded from the root tsconfig (it is never compiled —
      # Bun runs it from source), so without this step its type errors only ever
      # surface at runtime.
      - name: Typecheck CLI + TUI
        run: bun run typecheck:cli

      - name: Unit + property tests
        run: bun run test:unit

  # Mutation testing is slow (~3 min) and gated on thresholds.break in
  # stryker.config.json, so it runs on demand rather than on every push.
  mutation:
    name: Mutation testing
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Stryker
        run: bun run test:mutation

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 14

# Why there is no lint step:
#
# `bun run lint` (eslint .) currently reports ~4,600 pre-existing errors, almost
# all @typescript-eslint/no-explicit-any (~3,300) and no-unused-vars (~1,000),
# spread across packages/, src/, examples/ and tests/. A blocking lint step would
# make CI permanently red; a continue-on-error one would be a gate that can never
# fail. Neither is worth having.
#
# Fix that debt — or recalibrate the severities in .eslintrc.js to match how the
# codebase is actually written — and then add:
#
#   - name: Lint
#     run: bun run lint
